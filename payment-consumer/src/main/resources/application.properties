# Application
spring.application.name=payment-consumer
# No web server — this is a pure Kafka consumer
spring.main.web-application-type=none

# Stripe
stripe.api.key=test
#sk_test_BQokikJOvBiI2HlWgH4olfQ2

# Shared H2 file database — AUTO_SERVER=TRUE allows multiple processes to access
# the same file; H2 automatically starts an internal TCP server when needed.
# Path must match payment-system's datasource URL (relative to each app's working dir).
spring.datasource.url=jdbc:h2:file:../payment-system/data/paymentdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — update only, payment-system owns schema creation
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
# Deserializer is configured programmatically in KafkaConsumerConfig.java
spring.kafka.listener.concurrency=3

# Logging
logging.level.com.payment.consumer=DEBUG


