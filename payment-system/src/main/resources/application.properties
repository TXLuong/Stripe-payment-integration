# Application
spring.application.name=payment-system
server.port=8080

# Stripe Configuration
# sk_test_YOUR_STRIPE_TEST_API_KEY
stripe.api.key=sk_test_BQokikJOvBiI2HlWgH4olfQ2
stripe.webhook.secret=whsec_YOUR_STRIPE_WEBHOOK_SECRET

# H2 File Database (shared with payment-consumer via AUTO_SERVER)
spring.datasource.url=jdbc:h2:file:./data/paymentdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.com.payment=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.stripe=INFO

# Actuator (optional)
management.endpoints.web.exposure.include=health,info

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.payment.dto
spring.kafka.listener.concurrency=3
