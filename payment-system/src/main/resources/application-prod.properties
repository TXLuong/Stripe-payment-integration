# ============================================================
# PRODUCTION CONFIGURATION — DO NOT COMMIT REAL SECRETS
# Set these values via environment variables or a secrets manager
# ============================================================

# Application
server.port=${PORT:8080}

# Stripe Configuration (use live keys in production)
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# Production Database (PostgreSQL example)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/paymentdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:payment_user}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate (production settings)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console must be disabled in production
spring.h2.console.enabled=false

# Logging (production — reduce verbosity)
logging.level.com.payment=INFO
logging.level.org.springframework.web=WARN
logging.level.com.stripe=WARN

# Kafka (production)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.payment.dto
# Scale concurrency per instance; total parallelism = instances * concurrency (max = partition count)
spring.kafka.listener.concurrency=${KAFKA_LISTENER_CONCURRENCY:3}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
